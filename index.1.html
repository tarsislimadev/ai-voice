<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI voice</title>
  <script type="importmap">
    {
      "imports": {
        "afrontend": "https://cdn.jsdelivr.net/npm/afrontend@0.0.2/+esm"
      }
    }
  </script>
</head>

<body>
  <div id="app"></div>

  <h1>Speech color changer</h1>

  <p class="hints"></p>

  <button>Start recognition</button>

  <pre class="output"><em>...diagnostic messages</em></pre>

  <script type="module">
    import { HTML } from 'afrontend'

    class Page extends HTML {
      onCreate() {
        this.run()
      }

      run() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const SpeechRecognitionEvent = window.SpeechRecognitionEvent || window.webkitSpeechRecognitionEvent;

        const colors = [
          "aqua",
          "azure",
          "beige",
          "bisque",
          "black",
          "blue",
          "brown",
          "chocolate",
          "coral",
          // …
        ];

        const recognition = new SpeechRecognition();

        recognition.continuous = false;
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const diagnostic = document.querySelector(".output");
        const bg = document.querySelector("html");
        const hints = document.querySelector(".hints");
        const startBtn = document.querySelector("button");

        const colorHTML = colors
          .map((v) => `<span style="background-color:${v};">${v}</span>`)
          .join("");
        hints.innerHTML = `Press the button then say a color to change the background color of the app. Try ${colorHTML}.`;

        startBtn.onclick = () => {
          recognition.start();
          console.log("Ready to receive a color command.");
        };

        recognition.onresult = (event) => {
          const color = event.results[0][0].transcript;
          diagnostic.textContent = `Result received: ${color}.`;
          bg.style.backgroundColor = color;
          console.log(`Confidence: ${event.results[0][0].confidence}`);
        };

        recognition.onspeechend = () => {
          recognition.stop();
        };

        recognition.onnomatch = (event) => {
          diagnostic.textContent = "I didn't recognize that color.";
        };

        recognition.onerror = (event) => {
          diagnostic.textContent = `Error occurred in recognition: ${event.error}`;
        };

        // recognition.processLocally = true;

        startBtn.addEventListener("click", () => {
          // check availability of target language
          SpeechRecognition.available({ langs: ["en-US"] }).then(
            (result) => {
              if (result === "unavailable") {
                diagnostic.textContent += `\nen-US is not available to download at this time. Sorry!`;
              } else if (result === "available") {
                recognition.start();
                console.log("Ready to receive a color command.");
              } else {
                diagnostic.textContent += `\nen-US language pack is downloading...`;
                SpeechRecognition.install({
                  langs: ["en-US"],
                }).then((result) => {
                  if (result) {
                    diagnostic.textContent += `\nen-US language pack downloaded. Start recognition again.`;
                  } else {
                    diagnostic.textContent += `\nen-US language pack failed to download. Try again later.`;
                  }
                });
              }
            },
          );
        });

      }
    }

    HTML.fromId('app').append(new Page())
  </script>
</body>

</html>
